<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khôi phục mật khẩu - Poseidon ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .login-card { background: rgba(255, 255, 255, 0.98); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); overflow: hidden; width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.2); }
        .login-header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 35px 20px; text-align: center; border-bottom: 4px solid #3b82f6;}
        .form-control:focus { border-color: #8b5cf6; box-shadow: 0 0 0 0.25rem rgba(139, 92, 246, 0.25); }
        .btn-login { background: linear-gradient(45deg, #3b82f6, #8b5cf6); border: none; transition: 0.3s; color: white;}
        .btn-login:hover { background: linear-gradient(45deg, #2563eb, #7c3aed); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4); color: white;}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2 class="fw-bold m-0"><i class="bi bi-shield-lock-fill text-info"></i> BẢO MẬT TÀI KHOẢN</h2>
        </div>
        
        <div class="card-body p-4 p-md-5">
            <h5 class="text-center mb-2 text-dark fw-bold">Khôi Phục Mật Khẩu</h5>
            <p class="text-muted text-center small mb-4">Hệ thống sẽ kiểm tra Email trong hồ sơ Nhân sự (HRM) và gửi mã xác thực One-time Token.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label text-secondary fw-bold small">Email đăng ký tài khoản</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-envelope-fill"></i></span>
                        {{ form.email }} 
                    </div>
                </div>
                
                <button type="submit" class="btn btn-login w-100 fw-bold py-2 mb-3 fs-6 rounded-3">
                    <i class="bi bi-send-fill me-1"></i> KIỂM TRA EMAIL & GỬI MÃ
                </button>
                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none small fw-bold" style="color: #64748b;"><i class="bi bi-arrow-left"></i> Quay lại trang Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // JS để gắn CSS cho form mặc định của Django
        let emailInput = document.querySelector('input[name="email"]');
        if(emailInput) {
            emailInput.classList.add('form-control', 'border-start-0', 'ps-0', 'bg-light');
            emailInput.placeholder = 'Ví dụ: nhanvien@poseidon.vn';
        }
    </script>
</body>
</html>
