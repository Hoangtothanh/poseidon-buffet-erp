<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đã gửi mã xác nhận - Poseidon ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .login-card { background: rgba(255, 255, 255, 0.98); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); overflow: hidden; width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.2); }
        .login-header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 35px 20px; text-align: center; border-bottom: 4px solid #10b981;}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2 class="fw-bold m-0"><i class="bi bi-envelope-check-fill text-success"></i> ĐÃ GỬI EMAIL</h2>
        </div>
        
        <div class="card-body p-4 p-md-5 text-center">
            <div class="mb-4">
                <i class="bi bi-send-check text-success" style="font-size: 4rem;"></i>
            </div>
            <h5 class="text-dark fw-bold mb-3">Kiểm tra hộp thư của bạn</h5>
            <p class="text-muted small mb-4">
                Chúng tôi đã gửi một đường dẫn khôi phục mật khẩu (One-Time Token) đến địa chỉ email bạn vừa cung cấp.<br><br>
                <i>Vui lòng kiểm tra cả thư mục Spam/Junk nếu không tìm thấy.</i>
            </p>

            <a href="{% url 'login' %}" class="btn w-100 fw-bold py-2 fs-6 rounded-3 text-white" style="background: linear-gradient(45deg, #10b981, #059669);">
                <i class="bi bi-arrow-left me-1"></i> TRỞ VỀ TRANG ĐĂNG NHẬP
            </a>
        </div>
    </div>
</body>
</html>
